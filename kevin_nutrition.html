function mealRow(label, emoji, key, extra) {
  const m = M[key]; if(!m) return '';
  const sportTag = m.sport ? '<span class="kn-sport-tag">⚡ Pré-séance</span>' : '';
  const items = m.items.map(i=>`<li>${i}</li>`).join('');
  return `
  <div class="kn-meal" onclick="toggleMeal(this)">
    <div class="kn-meal-hdr">
      <span class="kn-meal-emoji">${m.e}</span>
      <span class="kn-meal-label">${label}${sportTag}</span>
      <span class="kn-meal-name">${m.name}</span>
      <span class="kn-meal-kcal">${m.kcal} kcal</span>
      <span class="kn-meal-arrow">▼</span>
    </div>
    <div class="kn-meal-body">
      <ul>${items}</ul>
      <div class="kn-meal-macros">
        <span class="kn-mpill p">🥩 ${m.P}g</span>
        <span class="kn-mpill l">🧈 ${m.L}g</span>
        <span class="kn-mpill g">🌾 ${m.G}g</span>
      </div>
    </div>
  </div>`;
}

function renderWeek(wi) {
  const days = WEEKS[wi];
  const typeLabel = {gym:'💪 GYM', tennis:'🎾 TENNIS', rest:'😴 REPOS'};
  return days.map(d => {
    const meals = [
      mealRow('Petit-déjeuner','','B'in d?d.B:'',null),
      mealRow('Déjeuner','','L'in d?d.L:'',null),
      d.C ? mealRow('Collation','',d.C,null) : '',
      mealRow('Dîner','','D'in d?d.D:'',null),
      d.E ? mealRow('Snack soirée','' ,d.E,null) : '',
    ].join('');
    const kcal = ['B','L','C','D','E'].reduce((s,k)=> s + (d[k]&&M[d[k]] ? M[d[k]].kcal : 0), 0);
    return `
    <div class="kn-day">
      <div class="kn-day-hdr ${d.type}">
        <div class="kn-day-left">
          <h3>${d.day}</h3>
          <p>${d.sub}</p>
        </div>
        <span class="kn-badge ${d.type}">${typeLabel[d.type]}</span>
        <span class="kn-kcal-badge">~${kcal} kcal</span>
      </div>
      <div class="kn-meals">${meals}</div>
    </div>`;
  }).join('');
}

function showKNWeek(wi, btn) {
  document.querySelectorAll('#kn-tabs .tb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('kn-content').innerHTML = renderWeek(wi);
}

function toggleMeal(el) {
  el.classList.toggle('open');
